<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Зурагнаас Текст Таних (AI-Засвартай)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --surface-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            background-attachment: fixed;
        }

        .container {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #a5b4fc 0%, #818cf8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.025em;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .card {
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--surface-border);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transition: transform 0.3s ease;
        }

        .upload-area {
            border: 2px dashed rgba(99, 102, 241, 0.5);
            border-radius: 12px;
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            background: rgba(99, 102, 241, 0.03);
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.08);
            transform: translateY(-2px);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.8;
        }

        .upload-text {
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .upload-subtext {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        #fileInput {
            display: none;
        }

        #previewArea {
            display: none;
            margin-top: 2rem;
            text-align: center;
        }

        #imagePreview {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.875rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1.5rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .btn:disabled {
            background: var(--text-secondary);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .results {
            display: none;
            margin-top: 2.5rem;
            gap: 1.5rem;
            grid-template-columns: 1fr 1fr;
        }

        .results.show {
            display: grid;
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-box {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--surface-border);
            border-radius: 12px;
            padding: 1.5rem;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .result-header {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary);
        }
        
        .result-header.ai {
            color: var(--success);
        }

        .result-content {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-primary);
            white-space: pre-wrap;
            flex-grow: 1;
            overflow-y: auto;
            max-height: 400px;
            padding-right: 0.5rem;
        }

        .result-content::-webkit-scrollbar {
            width: 6px;
        }
        .result-content::-webkit-scrollbar-track {
            background: transparent;
        }
        .result-content::-webkit-scrollbar-thumb {
            background: var(--surface-border);
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            .results {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Ухаалаг OCR</h1>
            <p class="subtitle">Зурагнаас текст таньж, хиймэл оюуны тусламжтай алдаагүй хөрвүүлнэ</p>
        </header>

        <div class="card">
            <div class="upload-area" id="dropZone">
                <div class="upload-icon">📄</div>
                <div class="upload-text">Зургаа энд чирж авчрах эсвэл дарж сонгоно уу</div>
                <div class="upload-subtext">Дэмжих форматууд: PNG, JPG, JPEG</div>
                <input type="file" id="fileInput" accept="image/png, image/jpeg, image/jpg" multiple>
            </div>

            <div id="previewArea">
                <img id="imagePreview" src="" alt="Сонгосон зураг">
                <div>
                    <button class="btn" id="submitBtn">
                        <span class="btn-text">Хөрвүүлэх</span>
                        <div class="loading-spinner" id="spinner"></div>
                    </button>
                </div>
            </div>
        </div>

        <div class="results" id="resultsArea">
            <div class="result-box">
                <div class="result-header">
                    <span>🔍</span> Буусан текст (Эх хувь)
                </div>
                <div class="result-content" id="rawText">
                    Хөрвүүлэлт хийгдээгүй байна...
                </div>
            </div>
            <div class="result-box">
                <div class="result-header ai">
                    <span>✨</span> AI-Засвар (Алдаагүй)
                </div>
                <div class="result-content" id="correctedText">
                    Хөрвүүлэлт хийгдээгүй байна...
                </div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const previewArea = document.getElementById('previewArea');
        const imagePreview = document.getElementById('imagePreview');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.querySelector('.btn-text');
        const spinner = document.getElementById('spinner');
        const resultsArea = document.getElementById('resultsArea');
        const rawTextEl = document.getElementById('rawText');
        const correctedTextEl = document.getElementById('correctedText');

        let selectedFiles = [];

        // Drag and Drop Logic
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });

        dropZone.addEventListener('drop', handleDrop, false);
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', handleFiles);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles({ target: { files } });
        }

        function handleFiles(e) {
            const files = [...e.target.files];
            if (files.length === 0) return;
            
            selectedFiles = files;
            const file = files[0]; // Show first image preview
            
            const reader = new FileReader();
            reader.onload = (event) => {
                imagePreview.src = event.target.result;
                previewArea.style.display = 'block';
                dropZone.style.display = 'none';
                resultsArea.classList.remove('show');
            };
            reader.readAsDataURL(file);
        }

        submitBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) return;

            // UI Loading state
            submitBtn.disabled = true;
            btnText.textContent = 'Уншиж байна...';
            spinner.style.display = 'block';
            resultsArea.classList.remove('show');

            const formData = new FormData();
            selectedFiles.forEach(file => {
                formData.append('files', file);
            });

            try {
                const baseUrl = window.location.protocol === 'file:' ? 'http://localhost:3000' : '';
                const response = await fetch(baseUrl + '/ocr', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    rawTextEl.textContent = data.combinedText || 'Текст олдсонгүй';
                    correctedTextEl.textContent = data.aiCorrected || 'AI засвар хийгдсэнгүй (GEMINI_API_KEY шалгах)';
                    resultsArea.classList.add('show');
                } else {
                    alert(data.error || 'Алдаа гарлаа');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Сервертэй холбогдоход алдаа гарлаа.');
            } finally {
                // UI Reset state
                submitBtn.disabled = false;
                btnText.textContent = 'Дахин хөрвүүлэх';
                spinner.style.display = 'none';
            }
        });
    </script>
</body>
</html>
